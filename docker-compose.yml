services:
  directus:
    image: directus/directus:11.8.0
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8055:8055"
    environment:
      KEY: ${DIRECTUS_KEY}
      SECRET: ${DIRECTUS_SECRET}
      DB_CLIENT: ${DIRECTUS_DB_CLIENT:-pg}
      DB_HOST: ${DIRECTUS_DB_HOST:-host.docker.internal}
      DB_PORT: ${DIRECTUS_DB_PORT:-5432}
      DB_DATABASE: ${DIRECTUS_DB_DATABASE:-${POSTGRES_DB:-dental_clinic}}
      DB_USER: ${DIRECTUS_DB_USER:-${POSTGRES_USER:-postgres}}
      DB_PASSWORD: ${DIRECTUS_DB_PASSWORD:-${POSTGRES_PASSWORD:-postgres}}
      ADMIN_EMAIL: ${DIRECTUS_ADMIN_EMAIL}
      ADMIN_PASSWORD: ${DIRECTUS_ADMIN_PASSWORD}
      PUBLIC_URL: ${DIRECTUS_PUBLIC_URL:-http://localhost:8055}
      WEBSOCKETS_ENABLED: ${DIRECTUS_WEBSOCKETS_ENABLED:-true}
      CORS_ENABLED: ${DIRECTUS_CORS_ENABLED:-true}
      CORS_ORIGIN: ${DIRECTUS_CORS_ORIGIN:-true}
    volumes:
      - ./apps/cms/uploads:/directus/uploads
      - ./apps/cms/extensions:/directus/extensions

  n8n:
    image: n8nio/n8n:latest
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      N8N_HOST: ${N8N_HOST:-localhost}
      N8N_PORT: ${N8N_PORT:-5678}
      N8N_PROTOCOL: ${N8N_PROTOCOL:-http}
      N8N_EDITOR_BASE_URL: ${N8N_EDITOR_BASE_URL:-http://localhost:5678}
      WEBHOOK_URL: ${N8N_WEBHOOK_URL}
      GENERIC_TIMEZONE: ${N8N_TIMEZONE:-Europe/London}
    volumes:
      - ./apps/automations/.n8n:/home/node/.n8n
      - ./apps/automations/files:/files
