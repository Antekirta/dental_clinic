services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: dental_clinic
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d dental_clinic"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

  directus:
    image: directus/directus:11.8.0
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8055:8055"
    env_file:
      - ./apps/cms/.env
    volumes:
      - ./apps/cms/uploads:/directus/uploads
      - ./apps/cms/extensions:/directus/extensions

  n8n:
    image: n8nio/n8n:latest
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      N8N_HOST: ${N8N_HOST:-localhost}
      N8N_PORT: ${N8N_PORT:-5678}
      N8N_PROTOCOL: ${N8N_PROTOCOL:-http}
      N8N_EDITOR_BASE_URL: ${N8N_EDITOR_BASE_URL:-http://localhost:5678}
      WEBHOOK_URL: ${N8N_WEBHOOK_URL:-http://localhost:5678}
      GENERIC_TIMEZONE: ${N8N_TIMEZONE:-Europe/London}
    volumes:
      - ./apps/automations/.n8n:/home/node/.n8n
      - ./apps/automations/files:/files

volumes:
  postgres_data:
